<!--
  [NEW] 정산 노드 트리 관리 (목록) 뷰
  
  jsTree를 통한 계층적 트리 렌더링 및 모던 UI 상세정보 카드
  
  @author gayul.kim
  @since 2026-02-25
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>노드 관리</title>
    <!-- jsTree CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.15/themes/default/style.min.css" />
</head>

<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
        <h1 class="h2 fw-bold">하위 조직 관리</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a th:href="@{/nodes/new}" class="btn btn-sm btn-primary d-flex align-items-center gap-1">
                <i class="bi bi-plus-lg"></i>
                신규 등록
            </a>
        </div>
    </div>

    <!-- Tree & Detail View Split Layout -->
    <div class="row g-4">
        <!-- 좌측: 조직 트리 영역 -->
        <div class="col-12 col-md-5 col-lg-4">
            <div class="card h-100">
                <div class="card-header py-3 bg-transparent border-bottom">
                    <h5 class="mb-0 fw-bold d-flex align-items-center gap-2">
                        <i class="bi bi-diagram-3 text-point-navy"></i> 조직 체계
                    </h5>
                </div>
                <div class="card-body">
                    <!-- 검색 입력창 -->
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-transparent text-muted border-end-0">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 ps-0" id="nodeSearch" placeholder="이름 검색...">
                    </div>
                    
                    <!-- jsTree Container -->
                    <div id="nodeTree" class="mt-2" style="overflow-x: auto;">
                        <!-- JS에서 트리가 렌더링됩니다. -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 우측: 조직 상세 영역 -->
        <div class="col-12 col-md-7 col-lg-8">
            <div class="card h-100">
                <div class="card-header py-3 bg-transparent border-bottom d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold" id="detailTitle">상세 정보</h5>
                    <a th:href="@{/nodes/edit}" class="btn btn-sm btn-outline-secondary" id="editBtn" style="display: none;">
                        <i class="bi bi-pencil"></i> 수정
                    </a>
                </div>
                <div class="card-body position-relative">
                    <div id="emptyGuide" class="text-center text-muted py-5">
                        <i class="bi bi-diagram-3 display-4 mb-3 opacity-50"></i>
                        <p>좌측 트리에서 조직을 선택하면 상세 정보가 나타납니다.</p>
                    </div>

                    <div id="nodeDetail" style="display: none;">
                        <div class="row mb-4">
                            <div class="col-sm-3 text-muted">이름</div>
                            <div class="col-sm-9 fw-bold fs-5" id="detailName"></div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-sm-3 text-muted">ID</div>
                            <div class="col-sm-9" id="detailId"></div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-sm-3 text-muted">수수료율</div>
                            <div class="col-sm-9">
                                <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 px-2 py-1 fs-6" id="detailFee"></span>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-sm-3 text-muted">상위 조직</div>
                            <div class="col-sm-9">
                                <span id="detailParent"></span>
                            </div>
                        </div>
                        <hr class="text-muted opacity-25">
                        <div class="row">
                            <div class="col-sm-3 text-muted">최근 수정일</div>
                            <div class="col-sm-9" id="detailUpdate">2026-02-25 10:00:00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jsTree JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.15/jstree.min.js"></script>

    <!-- Thymeleaf에서 전달된 Mock 데이터를 JS 객체로 파싱 -->
    <script th:inline="javascript">
        $(document).ready(function() {
            /*<![CDATA[*/
            var treeData = /*[[${treeData}]]*/ [];
            /*]]>*/

            var $tree = $('#nodeTree');

            $tree.jstree({
                'core': {
                    'data': treeData,
                    'themes': {
                        'name': 'default',
                        'responsive': true,
                        'dots': true,
                        'icons': true
                    }
                },
                'types': {
                    'default': {
                        'icon': 'bi bi-folder-fill text-point-navy'
                    }
                },
                'plugins': ["search", "wholerow", "types"]
            });

            // 검색 연동
            var to = false;
            $('#nodeSearch').keyup(function () {
                if(to) { clearTimeout(to); }
                to = setTimeout(function () {
                    var v = $('#nodeSearch').val();
                    $tree.jstree(true).search(v);
                }, 250);
            });

            // 노드 선택 시 상세 정보 업데이트
            $tree.on("select_node.jstree", function (e, data) {
                var node = data.node;
                
                $('#emptyGuide').hide();
                $('#nodeDetail').fadeIn();
                $('#editBtn').show().attr('href', '/nodes/edit?id=' + node.id);
                
                // 정규식으로 텍스트에서 비율(%) 추출 (Mock 데이터 포맷에 맞춰 임시 파싱)
                var rawText = node.text;
                var rateMatch = rawText.match(/\((.*?)\)/);
                var rate = rateMatch ? rateMatch[1] : '0%';
                var name = rawText.replace(/\(.*?\)/, '').trim();

                var parentText = "없음 (최상위 조직)";
                if(node.parent !== '#') {
                    var pNode = $tree.jstree(true).get_node(node.parent);
                    parentText = pNode.text.replace(/\(.*?\)/, '').trim();
                }

                $('#detailName').text(name);
                $('#detailId').text("ORG-" + node.id.padStart(4, '0'));
                $('#detailFee').text(rate);
                $('#detailParent').text(parentText);
            });
        });
    </script>
</div>
</body>
</html>
