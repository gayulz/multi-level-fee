<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF (Spring Security) -->
    <meta name="_csrf" content=""/>
    
    <title>SettleTree - Sign Up</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 공통 및 인증 스타일 로딩 -->
    <link rel="stylesheet" th:href="@{/css/welcome.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body">

    <!-- 감각적인 포인트 백그라운드 빛 -->
    <div class="ambient-glow pink"></div>
    <div class="ambient-glow orange"></div>

    <div class="auth-wrapper">
        <div class="glass-panel-auth panel-signup mx-auto">
            
            <div class="auth-header mb-4 text-center">
                <h2 class="auth-title" style="font-size: 1.8rem;">Create an account</h2>
            </div>
            
            <form th:action="@{/auth/signup}" method="post">
                <!-- 아이디/이메일 영역 (이메일 인증 버튼 포함) -->
                <div class="form-group">
                    <label class="form-label" for="email">Email <span class="required">*</span></label>
                    <div class="input-group-liquid">
                        <input type="email" id="email" name="email" class="form-control-liquid" placeholder="admin@settletree.com" required>
                        <!-- 중복 클릭 및 발송 대기 제약 위한 id 추가 -->
                        <button type="button" class="btn-verify" id="btnSendSignupCode" onclick="sendSignupAuthCode(this)">인증번호 전송</button>
                    </div>
                </div>
                
                <!-- 인증번호 확인 영역 (이메일 인증 전송 후 나타남) -->
                <div class="form-group" id="verifyCodeGroup" style="display: none;">
                    <label class="form-label" for="signupAuthCode">Verification Code</label>
                    <div class="input-group-liquid">
                        <input type="text" id="signupAuthCode" class="form-control-liquid" placeholder="인증번호 6자리">
                        <button type="button" class="btn-verify" id="btnConfirmAuthCode" onclick="confirmAuthCode(this)">확인</button>
                    </div>
                </div>
                
                <!-- 비밀번호 영역 -->
                <div class="form-group">
                    <label class="form-label" for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" name="password" class="form-control-liquid" placeholder="••••••••" required>
                </div>
                
                <!-- 연락처 영역 -->
                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" class="form-control-liquid" placeholder="010-0000-0000" required>
                </div>
                
                <!-- 소속 지점 선택 (드롭다운) -->
                <div class="form-group">
                    <label class="form-label" for="branch">Branch (소속 지점) <span class="required">*</span></label>
                    <select id="branch" name="branchId" class="form-control-liquid" required>
                        <option value="" disabled selected>지점을 선택해주세요</option>
                        <option value="1">서울 본사 (HQ)</option>
                        <option value="2">강남 지사</option>
                        <option value="3">부산 지사</option>
                        <option value="4">해외 법인 (US)</option>
                    </select>
                </div>
                
                <!-- 개인정보 약관 동의 -->
                <div class="terms-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        (필수) SettleTree의 <a href="/terms">서비스 이용약관</a> 및 <a href="/privacy">개인정보 처리방침</a>에 동의합니다. 관리자 승인 완료 후 로그인 및 서비스 이용이 가능함을 인지하였습니다.
                    </label>
                </div>
                
                <!-- 관리자 승인 알림 텍스트 -->
                <div class="wait-approval-text mb-3">
                    ※ 회원가입 완료 후 관리자의 최종 승인이 필요합니다.
                </div>
                
                <!-- 회원가입 제출 버튼 -->
                <button type="submit" class="btn-liquid-auth btn-liquid-signup" id="btnSubmitSignup">Continue</button>
            </form>
            
            <div class="auth-footer text-start mt-4">
                Already have an account? <a href="/auth/login" th:href="@{/auth/login}" class="auth-link">Log In</a>
            </div>
            
        </div>
    </div>
    
    <!-- [NEW] 범용 알림(Alert)을 대체할 커스텀 리퀴드 모달 팝업 -->
    <div id="authAlertModal" class="auth-modal-overlay" style="z-index: 9999;">
        <div class="glass-panel-auth auth-modal-content" style="max-width: 380px; text-align: center; padding: 2.5rem 2rem;">
            <div id="authAlertMessage" style="color: #fff; font-size: 1.05rem; margin-bottom: 2rem; font-weight: 500;">
                <!-- 메시지 내용 -->
            </div>
            <button type="button" class="btn-verify" style="padding: 0.6rem 2rem; width: auto;" onclick="closeAuthAlert()">확인</button>
        </div>
    </div>
    
    <script>
        // Custom Alert 
        function showAuthAlert(msg) {
            document.getElementById('authAlertMessage').innerText = msg;
            document.getElementById('authAlertModal').classList.add('active');
        }
        function closeAuthAlert() {
            document.getElementById('authAlertModal').classList.remove('active');
        }

        // 회원가입 전용 인증 발송 기능 (다중 클릭 방지)
        function sendSignupAuthCode(btn) {
            const emailInput = document.getElementById('email');
            if(!emailInput.value) {
                showAuthAlert('이메일 주소를 먼저 입력해주세요.');
                return;
            }
            
            // 전송 중 상태 표시
            btn.disabled = true;
            btn.innerText = '발송 중...';
            
            setTimeout(() => {
                showAuthAlert('인증번호 발송이 완료되었습니다.');
                btn.innerText = '재발송';
                
                // 숨겨진 인증 입력 창 노출
                document.getElementById('verifyCodeGroup').style.display = 'block';
                
                // 30초 쿨다운 후 버튼 다시 활성화
                setTimeout(() => {
                    btn.disabled = false;
                }, 30000);
                
            }, 800);
        }
        
        // 회원가입 시 인증 확인 로직 Mock
        function confirmAuthCode(btn) {
            btn.disabled = true;
            btn.innerText = '확인 중...';
            
            setTimeout(() => {
                const codeInput = document.getElementById('signupAuthCode');
                // Mock: 123456만 통과
                if(codeInput.value === '123456') {
                    showAuthAlert('이메일 인증이 완료되었습니다.');
                    btn.innerText = '인증완료';
                    codeInput.disabled = true; // 더 이상 변경 불가
                    document.getElementById('btnSendSignupCode').style.display = 'none'; // 재발송 버튼 숨김
                } else {
                    showAuthAlert('인증번호를 다시 확인해주세요. (테스트용: 123456)');
                    btn.disabled = false;
                    btn.innerText = '확인';
                }
            }, 500);
        }
    </script>

</body>
</html>
