<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF 관련 메타 태그 (차후 시큐리티 연동 시) -->
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    
    <title>SettleTree</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Welcome 전용 스타일 -->
    <link rel="stylesheet" th:href="@{/css/welcome.css}">
</head>
<body class="welcome-body">

    <!-- Spline 3D 인터랙티브 배경 -->
    <div class="spline-container">
        <!-- 사용자가 전달한 Spline Iframe -->
        <iframe src='https://my.spline.design/100followers-nxOHVAlvmvmjlSvCVO2QWpeB/' frameborder='0' width='100%' height='100%'></iframe>
    </div>

    <!-- UI 오버레이: 로그인 버튼, 타이틀 등 3D 화면(노트북) 위에 겹치도록 UI 배치 -->
    <div class="overlay-container">
        <!-- Glassmorphism 스타일 패널 -->
        <div class="glass-panel text-center">
            <h1 class="settle-tree-title">SettleTree</h1>
            <div class="title-sub">Multi-level Settlement System</div>
            
            <div class="d-flex justify-content-center gap-3 mt-4">
                <!-- 로그인 화면(추후 개발)으로 이동 -->
                <a th:href="@{/auth/login}" class="btn interactive-btn btn-login">Login</a>
                <a th:href="@{/auth/signup}" class="btn interactive-btn btn-signup">Sign Up</a>
            </div>
        </div>
    </div>

</body>
</html>
