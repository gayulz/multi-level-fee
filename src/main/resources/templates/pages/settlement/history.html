<!--
  [NEW] 정산 내역 목록 페이지
  
  검색 필터(기간, 주문ID, 상태)와 Mock 데이터 기반 정산 내역 테이블을 표시합니다.
  DataTables 라이브러리를 통한 정렬/검색/페이지네이션 적용
  
  @author gayul.kim
  @since 2026-03-04
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title th:text="${pageTitle}">정산 내역</title>
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" />
</head>

<body>
<div layout:fragment="content">
    <!-- 페이지 헤더 -->
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
        <h1 class="h2 fw-bold" th:text="${pageTitle}">정산 내역</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a th:href="@{/settlement/request}" class="btn btn-sm btn-primary d-flex align-items-center gap-1">
                <i class="bi bi-plus-lg"></i>
                새 정산 요청
            </a>
        </div>
    </div>

    <!-- 검색 필터 카드 -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-transparent py-3 border-bottom">
            <h6 class="mb-0 fw-bold d-flex align-items-center gap-2">
                <i class="bi bi-funnel text-point-navy"></i> 검색 필터
            </h6>
        </div>
        <div class="card-body">
            <form class="row g-3 align-items-end" id="filterForm">
                <!-- 기간 필터 -->
                <div class="col-12 col-md-3">
                    <label for="startDate" class="form-label small fw-bold">시작일</label>
                    <input type="date" class="form-control" id="startDate">
                </div>
                <div class="col-12 col-md-3">
                    <label for="endDate" class="form-label small fw-bold">종료일</label>
                    <input type="date" class="form-control" id="endDate">
                </div>
                <!-- 주문 ID 검색 -->
                <div class="col-12 col-md-3">
                    <label for="searchOrderId" class="form-label small fw-bold">주문 ID</label>
                    <input type="text" class="form-control" id="searchOrderId" placeholder="ORD-YYYYMMDD-NNN">
                </div>
                <!-- 상태 필터 -->
                <div class="col-12 col-md-2">
                    <label for="statusFilter" class="form-label small fw-bold">상태</label>
                    <select class="form-select" id="statusFilter">
                        <option value="">전체</option>
                        <option value="COMPLETED">완료</option>
                        <option value="PENDING">처리 중</option>
                        <option value="FAILED">실패</option>
                    </select>
                </div>
                <!-- 검색 버튼 -->
                <div class="col-12 col-md-1">
                    <button type="button" class="btn btn-primary w-100" id="searchBtn">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 정산 내역 테이블 카드 -->
    <div class="card shadow-sm border-0">
        <div class="card-header bg-transparent py-3 d-flex justify-content-between align-items-center border-bottom">
            <h5 class="mb-0 fw-bold d-flex align-items-center gap-2">
                <i class="bi bi-receipt text-point-navy"></i> 정산 내역
            </h5>
            <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 px-3 py-2"
                  th:text="${'총 ' + settlements.totalElements + '건'}">총 5건</span>
        </div>
        <div class="card-body">
            <div class="table-responsive mt-3">
                <table class="table table-hover align-middle mb-0 table-minimal" id="settlementTable">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" class="ps-4">주문 ID</th>
                            <th scope="col">루트 노드</th>
                            <th scope="col" class="text-end">결제 금액</th>
                            <th scope="col" class="text-end">수수료 합계</th>
                            <th scope="col" class="text-center">상태</th>
                            <th scope="col">정산 일시</th>
                            <th scope="col" class="text-center">상세</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${settlements.content}">
                            <td class="ps-4 fw-medium" th:text="${s.orderId}">ORD-001</td>
                            <td>
                                <span class="d-flex align-items-center gap-1">
                                    <i class="bi bi-diagram-3 text-muted"></i>
                                    <span th:text="${s.organization.orgName}">본사</span>
                                </span>
                            </td>
                            <td class="text-end fw-bold" th:text="${'₩' + #numbers.formatInteger(s.amount, 0, 'COMMA')}">₩100,000</td>
                            <td class="text-end text-point-navy fw-medium" th:text="${s.feeAmount != null ? '₩' + #numbers.formatInteger(s.feeAmount, 0, 'COMMA') : '-'}">₩17,050</td>
                            <td class="text-center">
                                <span th:if="${s.status.name() == 'COMPLETED'}" class="status-badge completed">완료</span>
                                <span th:if="${s.status.name() == 'PENDING'}" class="status-badge pending">대기</span>
                                <span th:if="${s.status.name() == 'AGENCY_APPROVED'}" class="status-badge agency-approved">대리점승인</span>
                                <span th:if="${s.status.name() == 'BRANCH_APPROVED'}" class="status-badge branch-approved">지사승인</span>
                                <span th:if="${s.status.name() == 'REJECTED'}" class="status-badge rejected">반려</span>
                            </td>
                            <td class="text-muted" th:text="${#temporals.format(s.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-04 10:00</td>
                            <td class="text-center">
                                <a th:href="@{/settlement/detail/{id}(id=${s.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${settlements.empty}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="bi bi-info-circle fs-2 d-block mb-2"></i>
                                정산 내역이 없습니다.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이지네이션 -->
            <div class="mt-4">
                <div th:replace="~{layout/fragments/pagination :: pagination(currentPage=${settlements.number}, totalPages=${settlements.totalPages}, baseUrl=${baseUrl})}"></div>
            </div>
        </div>
    </div>

    <!-- DataTables JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script th:inline="none">
        $(document).ready(function () {
            // 날짜 필터 기본값 동적 설정
            var today = new Date();
            var thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(today.getDate() - 30);

            var formatDate = function(d) {
                var year = d.getFullYear();
                var month = ('0' + (d.getMonth() + 1)).slice(-2);
                var day = ('0' + d.getDate()).slice(-2);
                return year + '-' + month + '-' + day;
            };

            $('#startDate').val(formatDate(thirtyDaysAgo));
            $('#endDate').val(formatDate(today));

            // [MIG] 서버 사이드 페이징을 위해 DataTables의 클라이언트 기능을 최소화
            var table = $('#settlementTable').DataTable({
                paging: false,     // 서버 사이드 페이징 사용하므로 끔
                searching: false,  // 서버 필터링 구조로 변경 예정이므로 끔
                info: false,       // 하단 정보 끔
                ordering: false,   // 서버 정렬 사용
                language: {
                    zeroRecords: "검색 결과가 없습니다"
                }
            });

            // 검색 버튼 클릭 시 (향후 서버 쿼리 파라미터로 처리하도록 고도화 가능)
            $('#searchBtn').on('click', function () {
                $('#filterForm').submit();
            });
        });
    </script>
</div>
</body>
</html>
