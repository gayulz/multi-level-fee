<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<!-- 페이지 타이틀 -->
<head>
	<title>개인정보 수정 - SettleTree</title>
</head>

<!-- 페이지별 CSS -->
<th:block layout:fragment="css">
	<link rel="stylesheet" href="/css/settings.css">
</th:block>

<!-- 컨텐츠 -->
<div layout:fragment="content">
	<div class="container py-4">
		<h2 class="page-title mb-4">개인정보 수정</h2>

		<!-- 알림 메시지 -->
		<div th:if="${message}" class="alert" th:classappend="${'alert-' + alertType}" role="alert">
			<span th:text="${message}">메시지</span>
		</div>

		<div class="row">
			<!-- 개인정보 수정 폼 -->
			<div class="col-lg-6 mb-4">
				<div class="card">
					<div class="card-header">
						<h5 class="mb-0">기본 정보</h5>
					</div>
					<div class="card-body">
						<form th:action="@{/settings/profile}" method="post">
							<!-- CSRF 토큰 -->
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

							<!-- 이메일 (변경 불가) -->
							<div class="mb-3">
								<label for="email" class="form-label">이메일 (변경 불가)</label>
								<input type="email" class="form-control" id="email" th:value="${user.email}" disabled>
								<small class="text-muted">이메일은 변경할 수 없습니다.</small>
							</div>

							<!-- 이름 -->
							<div class="mb-3">
								<label for="name" class="form-label">이름 <span class="text-danger">*</span></label>
								<input type="text" class="form-control" id="name" name="name" th:value="${user.name}" required>
							</div>

							<!-- 연락처 -->
							<div class="mb-3">
								<label for="phone" class="form-label">연락처 <span class="text-danger">*</span></label>
								<input type="tel" class="form-control" id="phone" name="phone" th:value="${user.phone}" required pattern="[0-9]{2,3}-[0-9]{3,4}-[0-9]{4}">
								<small class="text-muted">형식: 010-1234-5678</small>
							</div>

							<!-- 소속 조직 (변경 불가) -->
							<div class="mb-3">
								<label for="organization" class="form-label">소속 조직 (변경 불가)</label>
								<input type="text" class="form-control" id="organization" th:value="${user.organization.name}" disabled>
							</div>

							<!-- 권한 (변경 불가) -->
							<div class="mb-3">
								<label for="role" class="form-label">권한 (변경 불가)</label>
								<input type="text" class="form-control" id="role" th:value="${user.role.name()}" disabled>
							</div>

							<button type="submit" class="btn btn-primary">저장</button>
						</form>
					</div>
				</div>
			</div>

			<!-- 비밀번호 변경 폼 -->
			<div class="col-lg-6 mb-4">
				<div class="card">
					<div class="card-header">
						<h5 class="mb-0">비밀번호 변경</h5>
					</div>
					<div class="card-body">
						<form th:action="@{/settings/change-password}" method="post">
							<!-- CSRF 토큰 -->
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

							<!-- 현재 비밀번호 -->
							<div class="mb-3">
								<label for="currentPassword" class="form-label">현재 비밀번호 <span class="text-danger">*</span></label>
								<input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
							</div>

							<!-- 새 비밀번호 -->
							<div class="mb-3">
								<label for="newPassword" class="form-label">새 비밀번호 <span class="text-danger">*</span></label>
								<input type="password" class="form-control" id="newPassword" name="newPassword" required minlength="8" pattern="^(?=.*[A-Z])(?=.*[!@#$%^&*()_+\-=\[\]{};':&quot;\\|,.<>\/?])(?=.*[a-zA-Z0-9]).{8,}$">
								<small class="text-muted">최소 8자, 영문 대문자 1개, 특수문자 1개 이상</small>
							</div>

							<!-- 새 비밀번호 확인 -->
							<div class="mb-3">
								<label for="confirmPassword" class="form-label">새 비밀번호 확인 <span class="text-danger">*</span></label>
								<input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="8">
							</div>

							<button type="submit" class="btn btn-warning">비밀번호 변경</button>
						</form>
					</div>
				</div>
			</div>
		</div>

		<!-- 계정 정보 -->
		<div class="row">
			<div class="col-lg-12">
				<div class="card">
					<div class="card-header">
						<h5 class="mb-0">계정 정보</h5>
					</div>
					<div class="card-body">
						<div class="row">
							<div class="col-md-6">
								<p><strong>가입일:</strong> <span th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01 00:00</span></p>
								<p><strong>승인일:</strong> <span th:text="${user.approvedAt != null ? #temporals.format(user.approvedAt, 'yyyy-MM-dd HH:mm') : '미승인'}">2025-01-01 00:00</span></p>
							</div>
							<div class="col-md-6">
								<p><strong>마지막 로그인:</strong> <span th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt, 'yyyy-MM-dd HH:mm') : '기록 없음'}">2025-01-30 14:30</span></p>
								<p><strong>계정 상태:</strong>
									<span th:if="${user.active}" class="badge bg-success">활성</span>
									<span th:unless="${user.active}" class="badge bg-danger">비활성</span>
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<!-- 페이지별 JS -->
<th:block layout:fragment="script">
	<script>
		// 비밀번호 일치 검증
		document.querySelector('form[action*="change-password"]').addEventListener('submit', function(e) {
			const newPassword = document.getElementById('newPassword').value;
			const confirmPassword = document.getElementById('confirmPassword').value;

			if (newPassword !== confirmPassword) {
				e.preventDefault();
				alert('새 비밀번호가 일치하지 않습니다.');
			}
		});

		// 연락처 자동 하이픈 추가
		document.getElementById('phone').addEventListener('input', function(e) {
			let value = e.target.value.replace(/[^0-9]/g, '');
			let result = '';

			if (value.length <= 3) {
				result = value;
			} else if (value.length <= 7) {
				result = value.substring(0, 3) + '-' + value.substring(3);
			} else {
				result = value.substring(0, 3) + '-' + value.substring(3, 7) + '-' + value.substring(7, 11);
			}

			e.target.value = result;
		});
	</script>
</th:block>
</html>
