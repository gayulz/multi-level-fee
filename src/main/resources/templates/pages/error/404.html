<!--
  [NEW] 404 에러 페이지 - 페이지를 찾을 수 없음
  
  레이아웃 독립 페이지 (레이아웃 적용 안 함)
  Bootstrap 5 CDN 직접 로드
  
  @author gayul.kim
  @since 2026-03-04
-->
<!DOCTYPE html>
<html data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/welcome.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
    <script th:src="@{/js/main.js}"></script>
</head>
<body class="auth-body d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <!-- 포인트 글래스 조명 (Auth 에서 차용) -->
    <div class="ambient-glow pink" style="position: fixed; top: -100px; left: -10%; z-index: 0; filter: blur(150px); opacity: 0.3;"></div>
    <div class="ambient-glow orange" style="position: fixed; bottom: -50px; right: -5%; z-index: 0; filter: blur(150px); opacity: 0.3;"></div>

    <div class="text-center px-4 glass-panel-auth mx-auto" style="max-width: 500px; padding: 3rem;">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle display-1 text-warning opacity-75"></i>
        </div>
        <h1 class="display-4 fw-bold mb-2">404</h1>
        <h2 class="h4 text-muted mb-3">페이지를 찾을 수 없습니다</h2>
        <p class="text-muted mb-4">
            요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>
            URL을 확인하시거나 대시보드로 돌아가주세요.
        </p>
        <div class="d-flex justify-content-center gap-2 mt-4">
            <a th:href="@{/}" class="btn-liquid-auth btn-liquid-login" style="width: auto; font-size: 1rem;">
                <i class="bi bi-house-door me-1"></i> 대시보드로 이동
            </a>
            <button onclick="history.back()" class="btn-verify" style="padding: 0.9rem 1.5rem; width: auto; font-size: 1rem;">
                <i class="bi bi-arrow-left me-1"></i> 이전 페이지
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
