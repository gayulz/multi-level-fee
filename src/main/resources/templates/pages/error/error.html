<!--
  [NEW] 일반 에러 페이지
  
  Spring Boot 기본 에러 핸들링과 연동되는 공통 에러 페이지
  동적 에러 메시지 표시 지원
  
  @author gayul.kim
  @since 2026-03-04
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류가 발생했습니다</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <script th:src="@{/js/main.js}"></script>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="text-center px-4" style="max-width: 600px;">
        <div class="mb-4">
            <i class="bi bi-emoji-frown display-1 text-secondary opacity-75"></i>
        </div>
        <h1 class="h3 fw-bold mb-2">오류가 발생했습니다</h1>
        <p class="text-muted mb-2" th:text="${message}" th:if="${message}">알 수 없는 오류가 발생했습니다.</p>
        <p class="text-muted mb-4" th:unless="${message}">요청을 처리하는 중 문제가 발생했습니다.</p>
        
        <!-- 에러 상세 정보 (개발 모드에서만 표시) -->
        <div class="card border-0 bg-body-secondary text-start mb-4" th:if="${error}">
            <div class="card-body small">
                <p class="mb-1"><strong>상태 코드:</strong> <span th:text="${status}">-</span></p>
                <p class="mb-1"><strong>에러:</strong> <span th:text="${error}">-</span></p>
                <p class="mb-0"><strong>경로:</strong> <span th:text="${path}">-</span></p>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-2">
            <a th:href="@{/}" class="btn btn-primary px-4">
                <i class="bi bi-house-door me-1"></i> 대시보드로 이동
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-1"></i> 이전 페이지
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
