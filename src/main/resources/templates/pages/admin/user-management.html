<!--
  [NEW] SUPER_ADMIN 전용 사용자 관리 페이지

  가입 승인 대기 목록, 전체 회원 목록, 권한 변경 기능을 제공합니다.

  @author gayul.kim
  @since 2026-03-09
-->
<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/default}"
>
  <head>
    <title>관리자 - 사용자 관리</title>
  </head>

  <body>
    <div layout:fragment="content">
      <!-- 페이지 헤더 -->
      <div
        class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom"
      >
        <h1 class="h2 fw-bold">사용자 관리</h1>
      </div>

      <!-- 가입 승인 대기 목록 -->
      <div class="card mb-4">
        <div
          class="card-header py-3 d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0 fw-bold">
            <i class="bi bi-person-exclamation me-2"></i>가입 승인 대기
            <span
              class="badge bg-warning ms-2"
              th:text="${#lists.size(pendingUsers)}"
              >0</span
            >
          </h5>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col" class="ps-4">이메일</th>
                  <th scope="col">이름</th>
                  <th scope="col">소속 조직</th>
                  <th scope="col">가입 신청일</th>
                  <th scope="col">액션</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="user : ${pendingUsers}">
                  <td class="ps-4 fw-medium" th:text="${user.email}">
                    user@example.com
                  </td>
                  <td th:text="${user.name}">홍길동</td>
                  <td
                    th:text="${user.organization != null ? user.organization.orgName : '-'}"
                  >
                    강남대리점
                  </td>
                  <td
                    class="text-muted"
                    th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"
                  >
                    2026-03-09
                  </td>
                  <td>
                    <!-- 승인 -->
                    <form
                      th:action="@{/admin/users/{id}/approve(id=${user.userId})}"
                      method="post"
                      class="d-inline me-1"
                    >
                      <button type="submit" class="btn btn-sm btn-success">
                        <i class="bi bi-check-lg me-1"></i>승인
                      </button>
                    </form>
                    <!-- 반려 -->
                    <form
                      th:action="@{/admin/users/{id}/reject(id=${user.userId})}"
                      method="post"
                      class="d-inline"
                      onsubmit="return confirmReject(event, this);"
                    >
                      <input type="hidden" name="reason" id="rejectReason" />
                      <button
                        type="button"
                        class="btn btn-sm btn-outline-danger"
                        onclick="promptRejectReason(this.form)"
                      >
                        <i class="bi bi-x-lg me-1"></i>반려
                      </button>
                    </form>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pendingUsers)}">
                  <td colspan="5" class="text-center py-4 text-muted">
                    승인 대기 중인 사용자가 없습니다.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 전체 회원 목록 -->
      <div class="card">
        <div
          class="card-header py-3 d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0 fw-bold">
            <i class="bi bi-people me-2"></i>전체 회원
            <span
              class="badge bg-primary ms-2"
              th:text="${allUsers.totalElements}"
              >0</span
            >
          </h5>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col" class="ps-4">이메일</th>
                  <th scope="col">이름</th>
                  <th scope="col">소속 조직</th>
                  <th scope="col">현재 권한</th>
                  <th scope="col">상태</th>
                  <th scope="col">권한 변경</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="user : ${allUsers.content}">
                  <td class="ps-4 fw-medium" th:text="${user.email}">
                    user@example.com
                  </td>
                  <td th:text="${user.name}">홍길동</td>
                  <td
                    th:text="${user.organization != null ? user.organization.orgName : '-'}"
                  >
                    강남대리점
                  </td>
                  <td>
                    <span th:switch="${user.role?.name()}">
                      <span
                        th:case="'ROLE_SUPER_ADMIN'"
                        class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 px-2 py-1 rounded-pill"
                        >SUPER_ADMIN</span
                      >
                      <span
                        th:case="'ROLE_ADMIN'"
                        class="badge bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25 px-2 py-1 rounded-pill"
                        >ADMIN</span
                      >
                      <span
                        th:case="*"
                        class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 px-2 py-1 rounded-pill"
                        >USER</span
                      >
                    </span>
                  </td>
                  <td>
                    <span th:switch="${user.status?.name()}">
                      <span
                        th:case="'APPROVED'"
                        class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1 rounded-pill"
                        >승인됨</span
                      >
                      <span
                        th:case="'PENDING'"
                        class="badge bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25 px-2 py-1 rounded-pill"
                        >대기중</span
                      >
                      <span
                        th:case="*"
                        class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 px-2 py-1 rounded-pill"
                        >반려됨</span
                      >
                    </span>
                  </td>
                  <td>
                    <form
                      th:action="@{/admin/users/{id}/role(id=${user.userId})}"
                      method="post"
                      class="d-flex gap-2 align-items-center"
                    >
                      <select
                        name="role"
                        class="form-select form-select-sm"
                        style="width: auto"
                      >
                        <option
                          value="ROLE_USER"
                          th:selected="${user.role?.name() == 'ROLE_USER'}"
                        >
                          USER
                        </option>
                        <option
                          value="ROLE_ADMIN"
                          th:selected="${user.role?.name() == 'ROLE_ADMIN'}"
                        >
                          ADMIN
                        </option>
                        <option
                          value="ROLE_SUPER_ADMIN"
                          th:selected="${user.role?.name() == 'ROLE_SUPER_ADMIN'}"
                        >
                          SUPER_ADMIN
                        </option>
                      </select>
                      <button
                        type="submit"
                        class="btn btn-sm btn-outline-primary"
                      >
                        변경
                      </button>
                    </form>
                  </td>
                </tr>
                <tr th:if="${allUsers.isEmpty()}">
                  <td colspan="6" class="text-center py-4 text-muted">
                    등록된 사용자가 없습니다.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- [NEW] 페이징 처리 (10페이지 단위 블록 처리) -->
        <div class="card-footer bg-white border-0 py-3" th:if="${allUsers.totalPages > 1}"
             th:with="groupSize=10,
                      startPage=${(allUsers.number / groupSize) * groupSize},
                      endPage=${(startPage + groupSize - 1 < allUsers.totalPages - 1) ? startPage + groupSize - 1 : allUsers.totalPages - 1}">
          <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center mb-0">
              
              <!-- 처음 페이지로 이동 -->
              <li class="page-item" th:classappend="${allUsers.number < groupSize} ? 'd-none'">
                <a class="page-link" th:href="@{/admin/users(page=${startPage - 1})}" tabindex="-1" aria-disabled="true">&laquo; 이전블록</a>
              </li>

              <!-- 1페이지씩 이전 이동 -->
              <li class="page-item" th:classappend="${allUsers.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${allUsers.number - 1})}" tabindex="-1" aria-disabled="true">이전</a>
              </li>

              <!-- 페이지 번호 10개씩 노출 -->
              <li class="page-item" th:each="pageNumber : ${#numbers.sequence(startPage, endPage)}"
                  th:classappend="${pageNumber == allUsers.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(page=${pageNumber})}" th:text="${pageNumber + 1}">1</a>
              </li>

              <!-- 1페이지씩 다음 이동 -->
              <li class="page-item" th:classappend="${allUsers.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${allUsers.number + 1})}">다음</a>
              </li>

              <!-- 다음 블록으로 이동 -->
              <li class="page-item" th:classappend="${endPage == allUsers.totalPages - 1} ? 'd-none'">
                <a class="page-link" th:href="@{/admin/users(page=${endPage + 1})}">다음블록 &raquo;</a>
              </li>

            </ul>
          </nav>
        </div>

      </div>
    </div>
  </body>
</html>

<th:block layout:fragment="scripts">
  <script th:inline="javascript">
    function promptRejectReason(form) {
      const reason = prompt("반려 사유를 입력해 주세요:");
      if (reason && reason.trim() !== "") {
        form.querySelector("#rejectReason").value = reason.trim();
        form.submit();
      }
    }
  </script>
</th:block>
