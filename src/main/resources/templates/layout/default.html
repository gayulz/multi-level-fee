<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title layout:title-pattern="$CONTENT_TITLE - Admin Dashboard">Admin Dashboard</title>
	
	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	
	<!-- Custom CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">
	
	<!-- FOUC 방지 테마 초기화 스크립트 -->
	<script th:src="@{/js/main.js}"></script>
</head>
<body>
	<div th:replace="~{layout/fragments/header :: header}"></div>
	
	<div class="container-fluid p-0">
		<div class="d-flex">
			<!-- 사이드바 -->
			<div th:replace="~{layout/fragments/sidebar :: sidebar}"></div>
			
			<!-- 메인 컨텐츠 영역 -->
			<main class="flex-grow-1 main-content p-3 p-md-4">
				<div layout:fragment="content"></div>
			</main>
		</div>
	</div>
	
	<div th:replace="~{layout/fragments/footer :: footer}"></div>
	
	<!-- Bootstrap 5 JS Bundle -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
