<!--
  [MIG] Task 3.3: 공통 레이아웃 Light Trendy Glassmorphism 및 다국어 지원 리뉴얼
  
  Plus Jakarta Sans 폰트 및 Animated Mesh 로드
  
  @author gayul.kim
  @since 2026-04-10
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:lang="${#locale.language}">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title layout:title-pattern="$CONTENT_TITLE - SettleTree">SettleTree Admin</title>
	
	<!-- 폰트: Plus Jakarta Sans -->
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	
	<!-- Custom CSS (글로벌 토큰) -->
	<link th:href="@{/css/common.css}" rel="stylesheet">
	<link th:href="@{/css/style.css}" rel="stylesheet">
	
	<!-- 페이지별 CSS 주입 포인트 -->
	<th:block layout:fragment="css"></th:block>
	
	<!-- 스크립트 -->
	<script th:src="@{/js/main.js}"></script>
</head>
<body class="trendy-layout">
	
	<!-- Background Animated Shapes (Light Glassmorphism) -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

	<!-- 사이드바 (다국어 호환 뷰) -->
	<div th:replace="~{layout/fragments/sidebar :: sidebar}"></div>
	
	<!-- 헤더 (언어 선택 & 프로필) -->
	<div th:replace="~{layout/fragments/header :: header}"></div>
	
	<!-- 메인 컨텐츠 영역 -->
	<!-- 기존 .main-content 여백이 sidebar.html 및 header.html 공간 확보에 대응함 -->
	<main class="main-content" style="margin-left: 260px; padding: 100px 40px 60px 40px; min-height: 100vh; position: relative;">
		<div layout:fragment="content"></div>
	</main>
	
	<!-- 푸터 -->
	<div th:replace="~{layout/fragments/footer :: footer}" th:if="${false}"></div>
	
	<!-- Bootstrap 5 JS Bundle -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
