<!DOCTYPE html>
<html data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title layout:title-pattern="$CONTENT_TITLE - Admin Dashboard">Admin Dashboard</title>
	
	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	
	<!-- Custom CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">
	<!-- Liquid Glass Auth CSS (배경 및 디자인 토너 공유) -->
	<link th:href="@{/css/auth.css}" rel="stylesheet">
	
	<!-- FOUC 방지 테마 초기화 스크립트 -->
	<script th:src="@{/js/main.js}"></script>
</head>
<body class="auth-body" style="min-height: 100vh; animation: bgGradientMove 20s ease infinite;">
	
	<!-- 포인트 글래스 조명 (Auth 에서 차용) -->
    <div class="ambient-glow pink" style="position: fixed; top: -100px; left: -10%; z-index: 0; filter: blur(150px); opacity: 0.3;"></div>
    <div class="ambient-glow orange" style="position: fixed; bottom: -50px; right: -5%; z-index: 0; filter: blur(150px); opacity: 0.3;"></div>

	<!-- Relative Wrapper to stack objects over glow -->
	<div style="position: relative; z-index: 2; width: 100%; min-height: 100vh; display: flex; flex-direction: column;">
		<div th:replace="~{layout/fragments/header :: header}"></div>
	
	<div class="container-fluid p-0">
		<div class="d-flex">
			<!-- 사이드바 -->
			<div th:replace="~{layout/fragments/sidebar :: sidebar}"></div>
			
			<!-- 메인 컨텐츠 영역 -->
			<main class="flex-grow-1 main-content p-3 p-md-4">
				<div layout:fragment="content"></div>
			</main>
		</div>
		</div>
	</div>
	
	<div th:replace="~{layout/fragments/footer :: footer}"></div>
	</div>
	
	<!-- Bootstrap 5 JS Bundle -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
