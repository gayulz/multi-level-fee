<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle != null ? pageTitle + ' - Settlement Engine' : 'Settlement Engine'}">Settlement Engine</title>

	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

	<!-- Custom CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">

	<!-- 페이지별 추가 CSS -->
	<th:block th:fragment="extra-css"></th:block>
</head>
<body>
	<!-- Header -->
	<div th:replace="~{layout/fragments/header :: header}"></div>

	<div class="container-fluid">
		<div class="row">
			<!-- Sidebar -->
			<div th:replace="~{layout/fragments/sidebar :: sidebar}"></div>

			<!-- Main Content -->
			<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
				<div class="content-wrapper">
					<!-- 페이지 타이틀 -->
					<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom" th:if="${pageTitle}">
						<h1 class="h2" th:text="${pageTitle}">Page Title</h1>
					</div>

					<!-- 페이지 콘텐츠 영역 -->
					<div th:fragment="content">
						<!-- 각 페이지의 내용이 여기에 삽입됩니다 -->
					</div>
				</div>
			</main>
		</div>
	</div>

	<!-- Footer -->
	<div th:replace="~{layout/fragments/footer :: footer}"></div>

	<!-- jQuery -->
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

	<!-- Bootstrap 5 JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<!-- Custom JS -->
	<script th:src="@{/js/main.js}"></script>

	<!-- 페이지별 추가 JS -->
	<th:block th:fragment="extra-js"></th:block>
</body>
</html>
