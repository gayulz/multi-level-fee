<!--
  [MIG] 공통 레이아웃 (Task 2.3: White Base 스타일로 전면 리뉴얼)
  
  Bootstrap 5 CDN 및 Thymeleaf Layout Dialect 적용
  ambient-glow, dark-theme 등 기존 Liquid Glass 스타일 잔재 제거
  
  @author gayul.kim
  @since 2026-03-29
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title layout:title-pattern="$CONTENT_TITLE - Admin Dashboard">Admin Dashboard</title>
	
	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	
	<!-- Custom CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">
	
	<!-- 스크립트 (헤더 스크롤 이벤트 등) -->
	<script th:src="@{/js/main.js}"></script>
</head>
<body class="bg-light" style="min-height: 100vh; display: flex; flex-direction: column; background-color: var(--bg-body) !important;">
	
	<!-- 헤더 -->
	<div th:replace="~{layout/fragments/header :: header}"></div>
	
	<!-- 메인 레이아웃 -->
	<div class="container-fluid flex-grow-1 p-0">
		<div class="d-flex h-100">
			<!-- 사이드바 -->
			<div th:replace="~{layout/fragments/sidebar :: sidebar}"></div>
			
			<!-- 메인 컨텐츠 영역 -->
			<main class="flex-grow-1 main-content p-3 p-md-4">
				<div layout:fragment="content"></div>
			</main>
		</div>
	</div>
	
	<!-- 푸터 -->
	<div th:replace="~{layout/fragments/footer :: footer}"></div>
	
	<!-- Bootstrap 5 JS Bundle -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
