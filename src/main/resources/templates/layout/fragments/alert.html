<!--
  [NEW] 알림 메시지 Thymeleaf Fragment
  
  성공/경고/에러/정보 알림을 재사용 가능한 프래그먼트로 제공합니다.
  사용법 (호출 예시):
    <div th:replace="~{layout/fragments/alert :: alert(type='success', message='처리 완료!')}"></div>
  
  @author gayul.kim
  @since 2026-03-04
-->

<!-- 기본 알림 (type: success, warning, danger, info) -->
<div th:fragment="alert(type, message)" 
     class="alert d-flex align-items-center gap-2 alert-dismissible fade show" 
     th:classappend="'alert-' + ${type}" 
     role="alert">
    
    <i th:if="${type == 'success'}" class="bi bi-check-circle-fill fs-5"></i>
    <i th:if="${type == 'warning'}" class="bi bi-exclamation-triangle-fill fs-5"></i>
    <i th:if="${type == 'danger'}" class="bi bi-x-circle-fill fs-5"></i>
    <i th:if="${type == 'info'}" class="bi bi-info-circle-fill fs-5"></i>
    
    <div th:text="${message}">알림 메시지</div>
    
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="닫기"></button>
</div>

<!-- 제목 포함 알림 -->
<div th:fragment="alertWithTitle(type, title, message)" 
     class="alert d-flex align-items-start gap-2 alert-dismissible fade show" 
     th:classappend="'alert-' + ${type}" 
     role="alert">
    
    <i th:if="${type == 'success'}" class="bi bi-check-circle-fill fs-5 mt-1"></i>
    <i th:if="${type == 'warning'}" class="bi bi-exclamation-triangle-fill fs-5 mt-1"></i>
    <i th:if="${type == 'danger'}" class="bi bi-x-circle-fill fs-5 mt-1"></i>
    <i th:if="${type == 'info'}" class="bi bi-info-circle-fill fs-5 mt-1"></i>
    
    <div>
        <strong th:text="${title}">제목</strong>
        <p class="mb-0 small" th:text="${message}">상세 메시지</p>
    </div>
    
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="닫기"></button>
</div>
