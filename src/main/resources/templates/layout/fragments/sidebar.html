<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
	<!-- Sidebar Fragment -->
	<nav th:fragment="sidebar" id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
		<div class="position-sticky pt-3">
			<!-- 메인 메뉴 -->
			<h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
				<span>메인 메뉴</span>
			</h6>
			<ul class="nav flex-column">
				<li class="nav-item">
					<a class="nav-link" th:href="@{/}" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
						<i class="fas fa-home me-2"></i>
						대시보드
					</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/nodes}" th:classappend="${currentPage == 'nodes' ? 'active' : ''}">
						<i class="fas fa-sitemap me-2"></i>
						노드 관리
					</a>
				</li>
			</ul>

			<!-- 정산 관리 메뉴 -->
			<h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
				<span>정산 관리</span>
			</h6>
			<ul class="nav flex-column">
				<li class="nav-item">
					<a class="nav-link" th:href="@{/settlement/request}" th:classappend="${currentPage == 'settlement-request' ? 'active' : ''}">
						<i class="fas fa-calculator me-2"></i>
						정산 요청
					</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/settlement/history}" th:classappend="${currentPage == 'settlement-history' ? 'active' : ''}">
						<i class="fas fa-history me-2"></i>
						정산 내역
					</a>
				</li>
			</ul>

			<!-- 시스템 메뉴 -->
			<h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
				<span>시스템</span>
			</h6>
			<ul class="nav flex-column mb-2">
				<li class="nav-item">
					<a class="nav-link" href="http://localhost:15672" target="_blank">
						<i class="fas fa-network-wired me-2"></i>
						RabbitMQ 관리
						<i class="fas fa-external-link-alt ms-1 small"></i>
					</a>
				</li>
			</ul>
		</div>
	</nav>

	<!-- 사이드바 토글 JavaScript -->
	<script th:inline="javascript">
		document.addEventListener('DOMContentLoaded', function() {
			const sidebarToggle = document.getElementById('sidebarToggle');
			const sidebar = document.getElementById('sidebar');

			if (sidebarToggle && sidebar) {
				sidebarToggle.addEventListener('click', function() {
					sidebar.classList.toggle('show');
				});
			}
		});
	</script>
</body>
</html>
