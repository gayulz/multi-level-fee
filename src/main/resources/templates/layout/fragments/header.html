<!--
  [NEW] 상단 헤더 모듈
  
  반응형 오프캔버스 토글버튼 및 다크/라이트 테마 스위처 포함
  
  @author gayul.kim
  @since 2026-02-25
-->
<header th:fragment="header" class="header-top sticky-top p-3 d-flex align-items-center justify-content-between">
	<div class="d-flex align-items-center">
		<!-- 모바일용 오프캔버스 토글 버튼 (데스크톱에선 숨김) -->
		<button class="btn btn-outline-secondary d-lg-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
			<i class="bi bi-list"></i>
		</button>
		
		<!-- 로고 영역 -->
		<a class="navbar-brand fw-bold mb-0 text-decoration-none text-main" th:href="@{/}">
			<i class="bi bi-box-fill text-primary me-1"></i> Admin Dashboard
		</a>
	</div>
	
	<div class="d-flex align-items-center gap-3">
		<!-- 검색 버튼 (아이콘) -->
		<button class="btn btn-link text-muted p-0 text-decoration-none">
			<i class="bi bi-search fs-5"></i>
		</button>
		
		<!-- 다크/라이트 테마 스위처 -->
		<button class="btn btn-link text-muted p-0 text-decoration-none" id="theme-toggle">
			<i class="bi bi-moon-stars-fill fs-5" id="theme-toggle-icon"></i>
		</button>
		
		<!-- 프로필 아바타 -->
		<div class="dropdown">
			<a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
				<img src="https://github.com/mdo.png" alt="mdo" width="32" height="32" class="rounded-circle">
			</a>
			<ul class="dropdown-menu dropdown-menu-end text-small shadow">
				<li><a class="dropdown-item" href="#">설정</a></li>
				<li><a class="dropdown-item" href="#">프로필</a></li>
				<li><hr class="dropdown-divider"></li>
				<li><a class="dropdown-item" href="#">로그아웃</a></li>
			</ul>
		</div>
	</div>
</header>
