  [NEW] 500 에러 페이지 - 서버 오류
  
  레이아웃 독립 페이지
  
  @author gayul.kim
  @since 2026-03-04
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 서버 오류</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <script th:src="@{/js/main.js}"></script>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="text-center px-4">
        <div class="mb-4">
            <i class="bi bi-gear-wide-connected display-1 text-danger opacity-75"></i>
        </div>
        <h1 class="display-4 fw-bold mb-2">500</h1>
        <h2 class="h4 text-muted mb-3">서버 오류가 발생했습니다</h2>
        <p class="text-muted mb-4">
            서버에서 요청을 처리하는 도중 문제가 발생했습니다.<br>
            잠시 후 다시 시도해 주시거나, 관리자에게 문의해 주세요.
        </p>
        <div class="d-flex justify-content-center gap-2">
            <a th:href="@{/}" class="btn btn-primary px-4">
                <i class="bi bi-house-door me-1"></i> 대시보드로 이동
            </a>
            <button onclick="location.reload()" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-clockwise me-1"></i> 새로고침
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
