<!--
  [NEW] 403 에러 페이지 - 접근 권한 없음
  
  레이아웃 독립 페이지 (레이아웃 적용 안 함)
  Bootstrap 5 CDN 직접 로드
  
  @author gayul.kim
  @since 2026-03-09
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 접근 권한이 없습니다</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <script th:src="@{/js/main.js}"></script>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="text-center px-4">
        <div class="mb-4">
            <i class="bi bi-shield-lock display-1 text-danger opacity-75"></i>
        </div>
        <h1 class="display-4 fw-bold mb-2">403</h1>
        <h2 class="h4 text-muted mb-3">접근 권한이 없습니다</h2>
        <p class="text-muted mb-4">
            요청하신 페이지에 접근할 수 있는 권한이 없습니다.<br>
            관리자에게 문의하시거나 권한에 맞는 대시보드로 돌아가주세요.
        </p>
        <div class="d-flex justify-content-center gap-2">
            <a th:href="@{/dashboard}" class="btn btn-primary px-4">
                <i class="bi bi-house-door me-1"></i> 대시보드로 이동
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-1"></i> 이전 페이지
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
