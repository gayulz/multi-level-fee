spring:
  profiles:
    active: local
  application:
    name: settlement

  # Thymeleaf 공통 설정
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false # [MIG] 프론트엔드 실시간 수정을 위해 캐시 비활성화

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}

