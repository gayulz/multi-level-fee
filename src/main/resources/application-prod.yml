# 운영 환경 프로파일 설정
spring:
  # H2 콘솔 비활성화
  h2:
    console:
      enabled: false

  # 데이터베이스 설정 (PostgreSQL)
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:settlementdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # 커넥션 풀 최대 크기: 기본값(10)에서 증가
      # OCI 서버 PostgreSQL max_connections=100 기준으로 여유 확보
      maximum-pool-size: 20
      # 최소 유지 연결 수: 유휴 상태에서도 5개는 항상 준비
      minimum-idle: 5
      # 연결 대기 타임아웃: 30초 → 10초 (빠른 실패로 UX 개선)
      connection-timeout: 10000
      # 유휴 연결 해제 시간: 10분
      idle-timeout: 600000
      # 연결 최대 수명: 30분 (DB 강제 종료로 인한 stale 커넥션 방지)
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # RabbitMQ 설정
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          max-interval: 5000ms
          multiplier: 2.0

  # Thymeleaf 캐시 활성화
  thymeleaf:
    cache: true

# Logging
logging:
  level:
    com.example.settlement: INFO
    # prod 환경에서 Security DEBUG 로그는 불필요한 I/O 발생 → WARN으로 변경
    org.springframework.security: WARN
