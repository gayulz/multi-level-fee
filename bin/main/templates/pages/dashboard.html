<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/default}">

<!-- 페이지 타이틀 -->
<head>
	<title>대시보드 - SattleTree</title>
</head>

<!-- 페이지별 CSS -->
<th:block layout:fragment="css">
	<link rel="stylesheet" href="/css/dashboard.css">
</th:block>

<!-- 컨텐츠 -->
<div layout:fragment="content">
	<div class="container-fluid py-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="page-title mb-0">대시보드</h2>
			<div class="text-muted">
				<span th:text="${user.name}">사용자</span>님, 환영합니다!
			</div>
		</div>

		<!-- [Phase 4] 통계 카드 (sendr.ai stat-card 구조) -->
		<div class="dashboard-stats">
			<!-- 전체 요청 수 -->
			<div class="stat-card">
				<div class="stat-icon">
					<i class="bi bi-file-text"></i>
				</div>
				<div class="stat-label">전체 정산 요청</div>
				<div class="stat-value" th:text="${statistics.totalRequests}">0</div>
			</div>

			<!-- 승인 대기 -->
			<div class="stat-card">
				<div class="stat-icon">
					<i class="bi bi-clock-history"></i>
				</div>
				<div class="stat-label">승인 대기</div>
				<div class="stat-value" th:text="${statistics.pendingRequests}">0</div>
			</div>

			<!-- 승인 완료 -->
			<div class="stat-card">
				<div class="stat-icon">
					<i class="bi bi-check2-circle"></i>
				</div>
				<div class="stat-label">승인 완료</div>
				<div class="stat-value" th:text="${statistics.approvedRequests}">0</div>
			</div>

			<!-- 총 정산 금액 -->
			<div class="stat-card">
				<div class="stat-icon">
					<i class="bi bi-cash-coin"></i>
				</div>
				<div class="stat-label">총 정산 금액</div>
				<div class="stat-value" th:text="${'₩' + #numbers.formatInteger(statistics.totalAmount, 0, 'COMMA')}">₩0</div>
			</div>
		</div>

		<div class="row g-4">
			<!-- [Phase 4] 최근 정산 요청 섹션 (카드화) -->
			<div class="col-lg-8">
				<div class="dashboard-section-card h-100 pb-2">
					<div class="section-header">
						<h3 class="section-title">최근 정산 요청</h3>
						<a th:href="@{/settlements}" class="btn btn-outline-primary btn-sm rounded-pill px-3" style="font-size: 13px;">전체 보기</a>
					</div>

					<div class="table-responsive" th:if="${not #lists.isEmpty(recentSettlements)}">
						<table class="table table-hover align-middle mb-0" style="font-size: 14px;">
							<thead>
								<tr class="text-muted" style="border-bottom: 2px solid var(--border-color);">
									<th class="ps-3 py-3" style="font-weight: 600;">ID</th>
									<th class="py-3" style="font-weight: 600;">요청자</th>
									<th class="py-3" style="font-weight: 600;">조직</th>
									<th class="py-3 text-end" style="font-weight: 600;">금액</th>
									<th class="py-3 text-center" style="font-weight: 600;">상태</th>
									<th class="pe-3 py-3 text-end" style="font-weight: 600;">요청일</th>
								</tr>
							</thead>
							<tbody style="border-top: none;">
								<tr th:each="settlement : ${recentSettlements}" class="cursor-pointer" th:onclick="|location.href='@{/settlements}'|">
									<td class="ps-3 text-muted" th:text="${settlement.id}">1</td>
									<td class="fw-semibold text-heading" th:text="${settlement.requesterName}">홍길동</td>
									<td class="text-muted" th:text="${settlement.organizationName}">본사</td>
									<td class="text-end fw-bold text-heading">
										₩<span th:text="${#numbers.formatInteger(settlement.amount, 1, 'COMMA')}">0</span>
									</td>
									<td class="text-center">
										<span class="badge-status" 
											  th:classappend="${settlement.status == 'COMPLETED' ? 'completed' : (settlement.status == 'REJECTED' ? 'rejected' : 'pending')}"
											  th:text="${settlement.statusText}">
											상태
										</span>
									</td>
									<td class="text-end pe-3 text-muted" style="font-size: 13px;" th:text="${settlement.createdAt}">
										2026-03-30 00:00
									</td>
								</tr>
							</tbody>
						</table>
					</div>

					<div th:if="${#lists.isEmpty(recentSettlements)}" class="text-center py-5">
						<div class="mb-3 opacity-25">
							<i class="bi bi-inbox" style="font-size: 3rem;"></i>
						</div>
						<p class="text-muted mb-0">현재 표시할 정산 요청이 없습니다.</p>
					</div>
				</div>
			</div>

			<!-- 활성 사용자 및 반려 요청 카드 -->
			<div class="col-lg-4">
				<div class="stat-card mb-4">
					<div class="stat-icon">
						<i class="bi bi-people-fill"></i>
					</div>
					<div class="stat-label">활성 사용자</div>
					<div class="stat-value" th:text="${statistics.activeUsers}">0</div>
					<div class="text-muted" style="font-size: 13px;">현재 활성 계정</div>
				</div>

				<div class="stat-card" style="--stat-icon-bg: rgba(239, 68, 68, 0.08);">
					<div class="stat-icon" style="background: rgba(239, 68, 68, 0.08);">
						<i class="bi bi-x-circle-fill" style="color: var(--color-danger);"></i>
					</div>
					<div class="stat-label">반려된 요청</div>
					<div class="stat-value" style="color: var(--color-danger);" th:text="${statistics.rejectedRequests}">0</div>
					<div class="text-muted" style="font-size: 13px;">검토 후 반려 처리된 건</div>
				</div>
			</div>

		</div>

		<!-- [Phase 4] 조직 구조 트리 섹션 (카드화) -->
		<div class="row g-4 mt-2" sec:authorize="hasAnyRole('ADMIN', 'SUPER_ADMIN')" th:if="${organizationTree != null}">
			<div class="col-12">
				<div class="dashboard-section-card">
					<div class="section-header border-bottom pb-3 mb-4">
						<div class="d-flex align-items-center gap-3">
							<div class="stat-icon" style="margin-bottom: 0; background: rgba(25, 6, 90, 0.05); flex-shrink: 0;">
								<i class="bi bi-diagram-3-fill" style="color: var(--color-primary);"></i>
							</div>
							<div>
								<h3 class="section-title">조직 구조 트리</h3>
								<div class="text-muted" style="font-size: 13px;">본사부터 대리점까지 계통 구조 및 정산 요청 현황</div>
							</div>
						</div>
					</div>

					<div class="org-tree-container px-2">
						<ul class="org-tree">
						<li>
							<div class="org-node org-level-1">
								<div class="d-flex align-items-center gap-2">
									<span class="org-level-badge hq">본사</span>
									<span class="org-name" th:text="${organizationTree.name}">본사</span>
								</div>
								<span class="org-count" th:text="${organizationTree.requestCount + '건'}">0건</span>
							</div>

							<!-- 하위 조직 재귀 렌더링 -->
							<ul class="children" th:if="${not #lists.isEmpty(organizationTree.children)}">
								<li th:each="child : ${organizationTree.children}">
									<div class="org-node org-level-2">
										<div class="d-flex align-items-center gap-2">
											<span class="org-level-badge branch">지사</span>
											<span class="org-name" th:text="${child.name}">지사</span>
										</div>
										<span class="org-count" th:text="${child.requestCount + '건'}">0건</span>
									</div>

									<!-- 3단계 하위 조직 -->
									<ul class="children" th:if="${not #lists.isEmpty(child.children)}">
										<li th:each="grandchild : ${child.children}">
											<div class="org-node org-level-3">
												<div class="d-flex align-items-center gap-2">
													<span class="org-level-badge agency">대리점</span>
													<span class="org-name" th:text="${grandchild.name}">대리점</span>
												</div>
												<span class="org-count" th:text="${grandchild.requestCount + '건'}">0건</span>
											</div>
										</li>
									</ul>
								</li>
							</ul>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>
</div>

<!-- 페이지별 JS -->
<th:block layout:fragment="script">
	<script src="/js/dashboard.js"></script>
</th:block>
</html>
