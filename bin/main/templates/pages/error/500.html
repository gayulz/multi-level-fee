<!--
  [NEW] 500 에러 페이지 - 서버 오류
  
  레이아웃 독립 페이지
  
  @author gayul.kim
  @since 2026-03-04
-->
<!DOCTYPE html>
<html data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 서버 오류</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/welcome.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
    <script th:src="@{/js/main.js}"></script>
</head>
<body class="auth-body d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <!-- 포인트 글래스 조명 (Auth 에서 차용) -->
    <div class="ambient-glow pink" style="position: fixed; top: -100px; left: -10%; z-index: 0; filter: blur(150px); opacity: 0.3;"></div>
    <div class="ambient-glow orange" style="position: fixed; bottom: -50px; right: -5%; z-index: 0; filter: blur(150px); opacity: 0.3;"></div>

    <div class="text-center px-4 glass-panel-auth mx-auto" style="max-width: 500px; padding: 3rem;">
        <div class="mb-4">
            <i class="bi bi-gear-wide-connected display-1 text-danger opacity-75"></i>
        </div>
        <h1 class="display-4 fw-bold mb-2">500</h1>
        <h2 class="h4 text-muted mb-3">서버 오류가 발생했습니다</h2>
        <p class="text-muted mb-4">
            서버에서 요청을 처리하는 도중 문제가 발생했습니다.<br>
            잠시 후 다시 시도해 주시거나, 관리자에게 문의해 주세요.
        </p>
        <div class="d-flex justify-content-center gap-2 mt-4">
            <a th:href="@{/}" class="btn-liquid-auth btn-liquid-login" style="width: auto; font-size: 1rem;">
                <i class="bi bi-house-door me-1"></i> 대시보드로 이동
            </a>
            <button onclick="location.reload()" class="btn-verify" style="padding: 0.9rem 1.5rem; width: auto; font-size: 1rem;">
                <i class="bi bi-arrow-clockwise me-1"></i> 새로고침
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
