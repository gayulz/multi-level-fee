<!--
  [NEW] 모달 다이얼로그 Thymeleaf Fragment
  
  확인/삭제 작업용 재사용 가능한 Bootstrap 5 모달 제공
  사용법:
    <div th:replace="~{layout/fragments/modal :: confirmModal(id='deleteModal', title='삭제 확인', body='정말 삭제하시겠습니까?')}"></div>
  
  @author gayul.kim
  @since 2026-03-04
-->

<!-- 확인 모달 (확인/취소 버튼) -->
<div th:fragment="confirmModal(id, title, body)" class="modal fade" th:id="${id}" tabindex="-1" th:aria-labelledby="${id + 'Label'}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-bottom">
                <h5 class="modal-title fw-bold" th:id="${id + 'Label'}" th:text="${title}">확인</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>
            <div class="modal-body py-4" th:text="${body}">
                이 작업을 진행하시겠습니까?
            </div>
            <div class="modal-footer border-top">
                <button type="button" class="btn btn-light border" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary modal-confirm-btn">확인</button>
            </div>
        </div>
    </div>
</div>

<!-- 삭제 경고 모달 (빨간색 삭제 버튼) -->
<div th:fragment="deleteModal(id, title, body)" class="modal fade" th:id="${id}" tabindex="-1" th:aria-labelledby="${id + 'Label'}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-bottom">
                <h5 class="modal-title fw-bold d-flex align-items-center gap-2" th:id="${id + 'Label'}">
                    <i class="bi bi-exclamation-triangle-fill text-danger"></i>
                    <span th:text="${title}">삭제 확인</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>
            <div class="modal-body py-4" th:text="${body}">
                이 항목을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.
            </div>
            <div class="modal-footer border-top">
                <button type="button" class="btn btn-light border" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-danger modal-delete-btn">
                    <i class="bi bi-trash me-1"></i> 삭제
                </button>
            </div>
        </div>
    </div>
</div>
