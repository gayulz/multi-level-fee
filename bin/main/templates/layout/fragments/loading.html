<!--
  [NEW] 로딩 스피너 Thymeleaf Fragment
  
  다양한 로딩 상태 표시를 위한 재사용 가능 컴포넌트
  사용법:
    <div th:replace="~{layout/fragments/loading :: spinner}"></div>
    <div th:replace="~{layout/fragments/loading :: fullPageSpinner}"></div>
  
  @author gayul.kim
  @since 2026-03-04
-->

<!-- 인라인 스피너 (카드 내부 등에서 사용) -->
<div th:fragment="spinner" class="text-center py-5">
    <div class="spinner-border text-primary mb-3" role="status">
        <span class="visually-hidden">로딩 중...</span>
    </div>
    <p class="mb-0 text-muted small">데이터를 불러오는 중입니다...</p>
</div>

<!-- 전체 페이지 오버레이 스피너 -->
<div th:fragment="fullPageSpinner" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" 
     style="background-color: rgba(0,0,0,0.3); z-index: 9999;" id="fullPageLoader">
    <div class="card border-0 shadow-lg p-4 text-center" style="min-width: 200px;">
        <div class="spinner-border text-primary mx-auto mb-3" role="status">
            <span class="visually-hidden">처리 중...</span>
        </div>
        <p class="mb-0 fw-medium">처리 중입니다...</p>
        <p class="mb-0 text-muted small">잠시만 기다려 주세요.</p>
    </div>
</div>

<!-- 버튼 내부 스피너 (작은 사이즈) -->
<span th:fragment="btnSpinner" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
