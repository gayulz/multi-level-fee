server {
    listen 80;
    listen [::]:80;
    server_name settletree.p-e.kr;

    # Let's Encrypt 에러 방지를 위한 인증 라우팅
    location ~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    # 나머지 모든 통신을 HTTPS로 넘깁니다.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name settletree.p-e.kr;

    ssl_certificate /etc/letsencrypt/live/settletree.p-e.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/settletree.p-e.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
