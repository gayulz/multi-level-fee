version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: settlement-rabbitmq
    ports:
      - "5672:5672"      # AMQP 프로토콜 포트
      - "15672:15672"    # Management Console 포트
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rabbitmq_data:
