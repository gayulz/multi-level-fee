name: Deploy to OCI VM

# main 브랜치에 push 될 때마다 자동으로 이 파이프라인이 실행됩니다.
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build (GitHub Actions) & Deploy (OCI)
    runs-on: ubuntu-latest # GitHub에서 무료로 제공하는 서버에서 실행

    steps:
      # 1. 코드 체크아웃 (GitHub Actions 서버에 현재 코드를 받아옴)
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 2. Java 17 환경 세팅
      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. Gradle 캐시 설정 (의존성을 반복 다운로드하지 않도록 속도 최적화)
      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # 4. gradlew 실행 권한 부여
      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      # 5. 프로덕션 JAR 빌드 (테스트 제외, GitHub Actions 서버의 안정적인 네트워크 환경에서 실행)
      - name: Gradle Build (테스트 제외)
        run: ./gradlew clean build -x test

      # 6. 빌드된 JAR 파일을 OCI VM 서버로 전송 (SCP)
      - name: OCI 서버로 JAR 파일 전송 (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }} # OCI VM 외부 IP (168.107.55.226)
          username: ${{ secrets.OCI_USERNAME }} # OCI SSH 유저명 (ubuntu)
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "build/libs/*.jar,docker-compose.yml,Dockerfile,nginx/"
          target: "/home/${{ secrets.OCI_USERNAME }}/multi-level-fee/"
          strip_components: 0 # 경로 구조 그대로 유지

      # 7. OCI 서버에 SSH 접속 → docker compose 재빌드 및 재시작
      - name: OCI 서버 배포 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: SLACK_WEBHOOK_URL
          script: |
            cd ~/multi-level-fee
            touch .env
            echo "POSTGRES_USER=settlement" > .env.default
            echo "POSTGRES_PASSWORD=settlement_pass" >> .env.default
            echo "POSTGRES_DB=settlementdb" >> .env.default
            echo "RABBITMQ_DEFAULT_USER=admin" >> .env.default
            echo "RABBITMQ_DEFAULT_PASS=admin_pass" >> .env.default
            echo "SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL" >> .env.default
            # 기존 .env에서 위 6개 키를 제외한 커스텀 키 보존 (INIT_SUPER_ADMIN_PASSWORD 등)
            grep -v -E "^(POSTGRES_|RABBITMQ_|SLACK_WEBHOOK_URL)" .env >> .env.default || true
            mv .env.default .env
            # ContainerConfig 파싱 에러(docker-compose 버그) 방지를 위해 기존 컨테이너 완전 삭제 후 시작
            sudo docker-compose rm -fsv
            sudo docker-compose up -d --build
            
      # 8. 배포 결과 Slack 알림 전송
      - name: Slack 배포 알림 (Success/Failure)
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          author_name: GitHub Actions Deploy
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} # 슬랙 웹훅 URL
        if: always() # 빌드 실패 / 성공 여부와 상관없이 항상 실행
