name: Deploy to GCP VM

# main 브랜치에 push 될 때마다 자동으로 이 파이프라인이 실행됩니다.
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build (GitHub Actions) & Deploy (GCP)
    runs-on: ubuntu-latest # GitHub에서 무료로 제공하는 서버에서 실행

    steps:
      # 1. 코드 체크아웃 (GitHub Actions 서버에 현재 코드를 받아옴)
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 2. Java 17 환경 세팅
      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. Gradle 캐시 설정 (의존성을 반복 다운로드하지 않도록 속도 최적화)
      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # 4. gradlew 실행 권한 부여
      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      # 5. 프로덕션 JAR 빌드 (테스트 제외, GitHub Actions 서버의 안정적인 네트워크 환경에서 실행)
      - name: Gradle Build (테스트 제외)
        run: ./gradlew clean build -x test

      # 6. 빌드된 JAR 파일을 GCP VM 서버로 전송 (SCP)
      - name: GCP 서버로 JAR 파일 전송 (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }} # GCP VM 외부 IP (예: 34.64.108.71)
          username: ${{ secrets.GCP_USERNAME }} # GCP SSH 유저명 (예: sk01087901519)
          key: ${{ secrets.GCP_SSH_KEY }} # GCP SSH 개인키 (-----BEGIN OPENSSH...)
          source: "build/libs/*.jar"
          target: "/home/${{ secrets.GCP_USERNAME }}/multi-level-fee/"
          strip_components: 0 # 경로 구조 그대로 유지

      # 7. GCP 서버에 SSH 접속 → docker compose 재빌드 및 재시작 (--build는 JAR만 COPY하므로 빠름!)
      - name: GCP 서버 배포 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/multi-level-fee
            git pull
            docker compose up -d --build
            docker compose ps
